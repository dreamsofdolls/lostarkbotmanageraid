[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Register slash command schema on every Railway boot so schema stays in
# sync with the deployed code. `&&` ensures bot only starts after a
# successful register — a registration failure surfaces in Railway logs
# instead of silently leaving stale commands on Discord.
startCommand = "node src/deploy-commands.js && node src/bot.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
